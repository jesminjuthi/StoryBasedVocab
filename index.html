<!doctype html>
<html lang="bn">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Juthi's Story Based Vocab Library</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"
    />
    <style>
      body {
        font-family: "Inter", sans-serif;
        background: linear-gradient(135deg, #0a084b, #2b084b);
        min-height: 100vh;
      }

      .speaker-icon {
        cursor: pointer;
        transition: transform 0.2s ease-in-out;
      }
      .speaker-icon:hover {
        transform: scale(1.1);
      }
      .speaker-icon.loading {
        animation: pulse 1s infinite;
      }
      @keyframes pulse {
        0% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.1);
        }
        100% {
          transform: scale(1);
        }
      }

      html {
        scroll-behavior: smooth;
      }

      .story-link {
        text-decoration: none;
        border-bottom: 2px solid rgba(20, 184, 166, 0.5);
        transition: all 0.2s;
      }
      .story-link:hover {
        background-color: rgba(20, 184, 166, 0.2);
        border-bottom-color: #14b8a6;
      }

      .highlighted {
        animation: highlight-glow 2s ease-in-out forwards;
      }
      @keyframes highlight-glow {
        0% {
          box-shadow: 0 0 0 0px rgba(255, 165, 0, 0.4);
          transform: scale(1);
          background-color: rgba(255, 165, 0, 0.1);
        }
        50% {
          box-shadow: 0 0 20px 8px rgba(255, 165, 0, 0.6);
          transform: scale(1.05);
          background-color: rgba(255, 165, 0, 0.3);
        }
        100% {
          box-shadow: 0 0 0 0px rgba(255, 165, 0, 0);
          transform: scale(1);
          background-color: transparent;
        }
      }

      body::-webkit-scrollbar {
        width: 10px;
      }
      body::-webkit-scrollbar-track {
        background: #0a084b;
        border-radius: 10px;
      }
      body::-webkit-scrollbar-thumb {
        background-color: #14b8a6;
        border-radius: 10px;
        border: 2px solid #0a084b;
      }
      body::-webkit-scrollbar-thumb:hover {
        background-color: #0d9488;
      }

      .story-card {
        transition: all 0.3s ease;
      }
      .story-card:hover {
        transform: translateY(-5px);
        box-shadow:
          0 20px 25px -5px rgba(0, 0, 0, 0.1),
          0 10px 10px -5px rgba(0, 0, 0, 0.04);
      }

      .modal-content {
        max-height: 90vh;
        overflow-y: auto;
      }
    </style>
  </head>
  <body
    class="p-4 sm:p-8 flex flex-col items-center justify-start text-gray-800 dark:text-gray-200 relative"
  >
    <div id="home-view" class="w-full max-w-6xl animate-fade-in pb-20">
      <div
        class="flex flex-col md:flex-row justify-between items-center mb-10 gap-4"
      >
        <h1
          class="text-4xl sm:text-5xl font-bold text-white drop-shadow-lg text-center md:text-left"
        >
          Juthi's Vocab Library 📚
        </h1>

        <div class="flex flex-wrap justify-center gap-3">
          <button
            onclick="triggerImport()"
            class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-full font-bold shadow-lg text-sm flex items-center gap-2 transition transform hover:scale-105"
          >
            Import JSON
          </button>
          <input
            type="file"
            id="file-input"
            class="hidden"
            accept=".json"
            onchange="importData(this)"
          />

          <button
            onclick="exportData()"
            class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-full font-bold shadow-lg text-sm flex items-center gap-2 transition transform hover:scale-105"
          >
            Export JSON
          </button>

          <button
            onclick="openModal()"
            class="bg-teal-500 hover:bg-teal-600 text-white px-5 py-2 rounded-full font-bold shadow-lg flex items-center gap-2 transition transform hover:scale-105 border-2 border-white/20"
          >
            + নতুন গল্প
          </button>
        </div>
      </div>

      <div
        id="stories-grid"
        class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6"
      ></div>
    </div>

    <div
      id="story-view"
      class="hidden max-w-4xl w-full bg-white dark:bg-[#17153B] rounded-3xl shadow-2xl overflow-hidden border-4 border-teal-400 relative mb-10"
    >
      <div class="flex justify-between items-center p-4 sm:p-6 pb-0">
        <button
          onclick="showHome()"
          class="px-4 py-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg shadow transition flex items-center gap-2"
        >
          ← Back
        </button>
        <div class="flex gap-2">
          <button
            id="edit-btn"
            class="px-4 py-2 bg-amber-600 hover:bg-amber-700 text-white rounded-lg shadow transition flex items-center gap-2"
          >
            ✎ Edit
          </button>
          <button
            onclick="deleteCurrentStory()"
            class="px-4 py-2 bg-red-600 hover:bg-red-700 text-white rounded-lg shadow transition flex items-center gap-2"
          >
            🗑 Delete
          </button>
        </div>
      </div>

      <div class="p-6 sm:p-8 pt-4">
        <h1
          id="article-title"
          class="text-2xl sm:text-3xl md:text-4xl font-bold text-center mb-6 sm:mb-8 text-indigo-700 dark:text-indigo-400"
        ></h1>

        <p
          id="article-content"
          class="text-base sm:text-lg text-justify leading-relaxed mb-6 sm:mb-8 bg-blue-50 dark:bg-gray-800 p-6 rounded-2xl shadow-inner text-gray-800 dark:text-gray-200 border border-blue-100 dark:border-gray-700"
        ></p>

        <div
          id="glossary-section"
          class="mt-8 border-t dark:border-gray-600 pt-8"
        >
          <h2
            class="text-xl sm:text-2xl font-bold mb-6 text-center text-indigo-700 dark:text-indigo-400"
          >
            শব্দার্থ ও ব্যাখ্যা
          </h2>
          <div
            id="glossary-container"
            class="grid grid-cols-1 md:grid-cols-2 gap-4 sm:gap-6"
          ></div>
        </div>
      </div>
    </div>

    <div
      id="input-modal"
      class="hidden fixed inset-0 bg-black bg-opacity-80 z-50 flex items-center justify-center p-4 backdrop-blur-sm"
    >
      <div
        class="bg-white dark:bg-[#1f1b4e] w-full max-w-3xl rounded-2xl shadow-2xl modal-content p-6 border-2 border-teal-500"
      >
        <div
          class="flex justify-between items-center mb-6 border-b dark:border-gray-600 pb-4"
        >
          <h2
            class="text-2xl font-bold text-gray-800 dark:text-white"
            id="modal-heading"
          >
            নতুন গল্প যুক্ত করুন
          </h2>
          <button
            onclick="closeModal()"
            class="text-red-500 hover:text-red-700 font-bold text-3xl leading-none"
          >
            &times;
          </button>
        </div>

        <div class="space-y-4">
          <div>
            <label
              class="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-1"
              >গল্পের নাম (Title)</label
            >
            <input
              type="text"
              id="input-title"
              class="w-full p-3 rounded-lg border dark:bg-gray-700 dark:border-gray-600 dark:text-white focus:ring-2 focus:ring-teal-500 outline-none transition"
              placeholder="গল্পের শিরোনাম দিন..."
            />
          </div>

          <div>
            <label
              class="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-1"
              >সম্পূর্ণ কন্টেন্ট</label
            >
            <p class="text-xs text-gray-500 dark:text-gray-400 mb-2">
              ফরম্যাট: প্রথমে গল্প, তারপর "Take a Quick Look", তারপর তালিকা
              (যেমন: ১. Word - Meaning)।
            </p>
            <textarea
              id="input-raw-text"
              rows="12"
              class="w-full p-3 rounded-lg border dark:bg-gray-700 dark:border-gray-600 dark:text-white font-mono text-sm focus:ring-2 focus:ring-teal-500 outline-none transition"
              placeholder="এখানে পেস্ট করুন..."
            ></textarea>
          </div>

          <div class="flex justify-end gap-3 pt-4">
            <button
              onclick="closeModal()"
              class="px-5 py-2 bg-gray-500 text-white rounded-lg hover:bg-gray-600 font-semibold"
            >
              Cancel
            </button>
            <button
              onclick="processAndAddStory()"
              class="px-6 py-2 bg-teal-600 text-white rounded-lg hover:bg-teal-700 font-bold shadow-lg transform active:scale-95 transition"
            >
              Save Story
            </button>
          </div>
        </div>
      </div>
    </div>

    <button
      id="scroll-to-top-btn"
      class="hidden fixed bottom-6 right-6 z-50 p-3 bg-teal-500 text-white rounded-full shadow-lg hover:bg-teal-600 transition hover:-translate-y-1"
    >
      <svg
        xmlns="http://www.w3.org/2000/svg"
        class="h-6 w-6"
        fill="none"
        viewBox="0 0 24 24"
        stroke="currentColor"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M5 10l7-7m0 0l7 7m-7-7v18"
        />
      </svg>
    </button>

    <script>
      // ================= CONFIGURATION =================
      const colorPalette = [
        "purple",
        "orange",
        "lime",
        "pink",
        "cyan",
        "teal",
        "yellow",
        "red",
        "indigo",
      ];
      let stories = [];
      let editingStoryId = null;
      let currentStoryId = null;

      // ================= INITIALIZATION =================
      function initApp() {
        const savedStories = localStorage.getItem("myStoryApp_stories");
        if (savedStories) {
          try {
            stories = JSON.parse(savedStories);
          } catch (e) {
            console.error("Data corrupted, resetting.");
            stories = [];
          }
        }
        renderHome();
      }

      function saveStoriesToLocal() {
        localStorage.setItem("myStoryApp_stories", JSON.stringify(stories));
      }

      // ================= CORE: PARSING LOGIC =================
      function processAndAddStory() {
        const title = document.getElementById("input-title").value.trim();
        const rawText = document.getElementById("input-raw-text").value;

        if (!title || !rawText) {
          alert("দয়া করে টাইটেল এবং কন্টেন্ট দিন।");
          return;
        }

        const splitParts = rawText.split(
          /Take a Quick Look|শব্দার্থ|Quick Look/i,
        );
        const articleText = splitParts[0].trim();
        const glossaryText =
          splitParts.length > 1 ? splitParts.slice(1).join(" ") : "";

        const glossary = [];
        const lines = glossaryText.split("\n");

        lines.forEach((line) => {
          line = line.trim();
          if (!line) return;

          if (!line.includes("-") && !line.includes("–") && !line.includes("—"))
            return;

          let parts = line.split(/[\-–—]/);
          if (parts.length < 2) return;

          let leftPart = parts[0].trim();
          let meaning = parts.slice(1).join("-").trim();

          let cleanLeft = leftPart.replace(/^[0-9০-৯]+[\.|,]\s*/, "");

          let word = "";
          let banglaWord = "";

          const parenMatch = cleanLeft.match(/(.*)\((.*)\)$/);

          if (parenMatch) {
            word = parenMatch[1].trim();
            banglaWord = parenMatch[2].trim();
          } else {
            word = cleanLeft.trim();
          }

          if (word && meaning) {
            let color =
              colorPalette[Math.floor(Math.random() * colorPalette.length)];
            glossary.push({
              word: word,
              banglaWord: banglaWord,
              meaning: meaning,
              color: color,
            });
          }
        });

        if (editingStoryId) {
          const index = stories.findIndex((s) => s.id === editingStoryId);
          if (index !== -1) {
            stories[index].title = title;
            stories[index].shortDesc = articleText.substring(0, 100) + "...";
            stories[index].article = articleText;
            stories[index].glossary = glossary;
            loadStory(editingStoryId);
          }
        } else {
          const newStory = {
            id: Date.now(),
            title: title,
            shortDesc: articleText.substring(0, 100) + "...",
            article: articleText,
            glossary: glossary,
          };
          stories.push(newStory);
          loadStory(newStory.id);
        }

        saveStoriesToLocal();
        renderHome();
        closeModal();
      }

      // ================= IMPORT / EXPORT =================
      function exportData() {
        const dataStr = JSON.stringify(stories, null, 2);
        const dataUri =
          "data:application/json;charset=utf-8," + encodeURIComponent(dataStr);
        const linkElement = document.createElement("a");
        linkElement.setAttribute("href", dataUri);
        linkElement.setAttribute("download", "juthi_vocab_backup.json");
        linkElement.click();
      }

      function triggerImport() {
        document.getElementById("file-input").click();
      }

      function importData(input) {
        const file = input.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function (e) {
          try {
            const imported = JSON.parse(e.target.result);
            if (Array.isArray(imported)) {
              stories = imported;
              saveStoriesToLocal();
              renderHome();
              alert("Import Successful!");
            } else {
              alert("Invalid file format.");
            }
          } catch (err) {
            alert("Error reading file.");
          }
        };
        reader.readAsText(file);
        input.value = "";
      }

      // ================= UI FUNCTIONS =================
      function openModal(isEdit = false) {
        const modal = document.getElementById("input-modal");
        const heading = document.getElementById("modal-heading");

        if (!isEdit) {
          editingStoryId = null;
          document.getElementById("input-title").value = "";
          document.getElementById("input-raw-text").value = "";
          heading.innerText = "নতুন গল্প যুক্ত করুন";
        } else {
          heading.innerText = "গল্প এডিট করুন";
        }
        modal.classList.remove("hidden");
      }

      function closeModal() {
        document.getElementById("input-modal").classList.add("hidden");
        editingStoryId = null;
      }

      function prepareEdit(id) {
        const story = stories.find((s) => s.id === id);
        if (!story) return;

        editingStoryId = id;
        document.getElementById("input-title").value = story.title;

        let reconstructedText = story.article + "\n\nTake a Quick Look\n\n";

        story.glossary.forEach((item, index) => {
          const pron = item.banglaWord ? `(${item.banglaWord})` : "";
          reconstructedText += `${index + 1}. ${item.word} ${pron} - ${item.meaning}\n`;
        });

        document.getElementById("input-raw-text").value = reconstructedText;
        openModal(true);
      }

      function deleteCurrentStory() {
        if (!currentStoryId) return;
        if (confirm("আপনি কি নিশ্চিত যে আপনি এই গল্পটি মুছে ফেলতে চান?")) {
          stories = stories.filter((s) => s.id !== currentStoryId);
          saveStoriesToLocal();
          renderHome();
          showHome();
        }
      }

      // ================= RENDERING =================
      function renderHome() {
        const grid = document.getElementById("stories-grid");
        grid.innerHTML = "";

        if (stories.length === 0) {
          grid.innerHTML = `<div class="col-span-full text-center text-white opacity-70 mt-10">কোনো গল্প নেই। 'Import JSON' অথবা 'নতুন গল্প' বাটনে ক্লিক করুন।</div>`;
          return;
        }

        const reversedStories = [...stories].reverse();

        reversedStories.forEach((story) => {
          const card = document.createElement("div");
          card.className =
            "story-card bg-white dark:bg-[#1f1b4e] p-6 rounded-2xl shadow-lg cursor-pointer border-2 border-transparent hover:border-teal-400 flex flex-col h-full";
          card.onclick = () => loadStory(story.id);

          card.innerHTML = `
                <div class="h-32 bg-gradient-to-br from-teal-400 to-blue-600 rounded-xl mb-4 flex items-center justify-center text-5xl shadow-inner text-white">
                    📖
                </div>
                <h3 class="text-xl font-bold text-gray-800 dark:text-white mb-2 line-clamp-2">${story.title}</h3>
                <p class="text-gray-600 dark:text-gray-300 text-sm line-clamp-3 mb-4 flex-grow">${story.shortDesc}</p>
                <div class="mt-auto pt-4 border-t border-gray-200 dark:border-gray-600 flex justify-between items-center">
                    <span class="text-xs font-semibold bg-gray-100 dark:bg-gray-700 px-2 py-1 rounded text-gray-600 dark:text-gray-300 border dark:border-gray-600">${story.glossary.length} Words</span>
                    <span class="text-teal-600 dark:text-teal-400 font-bold text-sm group-hover:underline">Read Now →</span>
                </div>
            `;
          grid.appendChild(card);
        });
      }

      function loadStory(id) {
        const storyData = stories.find((s) => s.id === id);
        if (!storyData) return;

        currentStoryId = id;
        document.getElementById("home-view").classList.add("hidden");
        document.getElementById("story-view").classList.remove("hidden");
        window.scrollTo(0, 0);

        document.getElementById("edit-btn").onclick = () => prepareEdit(id);
        renderStoryContent(storyData);
      }

      function showHome() {
        document.getElementById("story-view").classList.add("hidden");
        document.getElementById("home-view").classList.remove("hidden");
        window.scrollTo(0, 0);
        currentStoryId = null;
      }

      function renderStoryContent(storyData) {
        document.getElementById("article-title").textContent = storyData.title;
        let highlightedArticle = storyData.article;

        const sortedGlossary = [...storyData.glossary].sort(
          (a, b) => b.word.length - a.word.length,
        );

        sortedGlossary.forEach((item) => {
          const id = createId(item.word);
          const safeWord = item.word.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
          const regex = new RegExp(`(${safeWord})`, "gi");
          const linkHTML = `<a href="#${id}" class="story-link font-bold text-${item.color}-600 dark:text-${item.color}-400" data-glossary-id="${id}" onclick="handleLinkClick(event, '${id}')">$1</a>`;
          highlightedArticle = highlightedArticle.replace(regex, linkHTML);
        });

        highlightedArticle = highlightedArticle.replace(/\n/g, "<br>");
        document.getElementById("article-content").innerHTML =
          highlightedArticle;

        let glossaryHtml = "";
        storyData.glossary.forEach((item) => {
          const id = createId(item.word);
          const wordWithBangla = item.banglaWord ? `(${item.banglaWord})` : "";

          glossaryHtml += `
            <div id="${id}" class="flex flex-col p-4 bg-${item.color}-100 dark:bg-gray-700 rounded-lg shadow-md transition-all duration-300 hover:bg-${item.color}-200 dark:hover:bg-gray-600 transform hover:-translate-y-1 border-l-4 border-${item.color}-500">
              <div class="flex items-center justify-between">
                <span class="font-semibold text-lg sm:text-xl text-${item.color}-700 dark:text-${item.color}-300">${item.word} ${wordWithBangla}</span>
                
                <div class="flex space-x-2">
                   <div class="flex items-center cursor-pointer p-1 rounded hover:bg-white/20" title="US Pronunciation" onclick="playPronunciation('${item.word}', 'en-US', this)">
                    <svg class="speaker-icon w-5 h-5 text-${item.color}-700 dark:text-${item.color}-300" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M14 3.23a2.5 2.5 0 0 1 0 17.54v-2.1a9.23 9.23 0 0 0 0-13.34V3.23ZM16.5 7.18a5.95 5.95 0 0 1 0 9.64v-1.78a3.46 3.46 0 0 0 0-6.08V7.18ZM12 4a.97.97 0 0 0-1-.87L7.43 5.4a1 1 0 0 1-.62.24H3.5a1.5 1.5 0 0 0-1.5 1.5v9.72a1.5 1.5 0 0 0 1.5 1.5h3.31a1 1 0 0 1 .62.24l3.58 2.34A.97.97 0 0 0 12 20V4Z"/></svg>
                    <span class="ml-1 text-xs text-${item.color}-700 dark:text-${item.color}-300 font-bold">US</span>
                   </div>

                   <div class="flex items-center cursor-pointer p-1 rounded hover:bg-white/20" title="UK Pronunciation" onclick="playPronunciation('${item.word}', 'en-GB', this)">
                    <svg class="speaker-icon w-5 h-5 text-${item.color}-700 dark:text-${item.color}-300" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M14 3.23a2.5 2.5 0 0 1 0 17.54v-2.1a9.23 9.23 0 0 0 0-13.34V3.23ZM16.5 7.18a5.95 5.95 0 0 1 0 9.64v-1.78a3.46 3.46 0 0 0 0-6.08V7.18ZM12 4a.97.97 0 0 0-1-.87L7.43 5.4a1 1 0 0 1-.62.24H3.5a1.5 1.5 0 0 0-1.5 1.5v9.72a1.5 1.5 0 0 0 1.5 1.5h3.31a1 1 0 0 1 .62.24l3.58 2.34A.97.97 0 0 0 12 20V4Z"/></svg>
                    <span class="ml-1 text-xs text-${item.color}-700 dark:text-${item.color}-300 font-bold">UK</span>
                   </div>
                </div>

              </div>
              <span class="text-sm sm:text-base mt-2 text-gray-800 dark:text-gray-200 font-medium">${item.meaning}</span>
            </div>
          `;
        });
        document.getElementById("glossary-container").innerHTML = glossaryHtml;
      }

      // ================= UTILS & EVENTS =================
      function createId(word) {
        return "glossary-" + word.toLowerCase().replace(/[^a-z0-9]/g, "-");
      }

      function handleLinkClick(event, id) {
        event.preventDefault();
        const element = document.getElementById(id);
        if (element) {
          element.scrollIntoView({ behavior: "smooth", block: "center" });
          document
            .querySelectorAll(".highlighted")
            .forEach((el) => el.classList.remove("highlighted"));
          element.classList.add("highlighted");
        }
      }

      let speechSynth = window.speechSynthesis;
      function playPronunciation(text, lang, button) {
        if (!speechSynth) return;
        if (speechSynth.speaking) {
          speechSynth.cancel();
        }
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = lang;

        const icon = button.querySelector("svg") || button;

        utterance.onstart = () => {
          icon.classList.add("loading");
        };
        utterance.onend = () => {
          icon.classList.remove("loading");
        };
        utterance.onerror = () => {
          icon.classList.remove("loading");
        };
        speechSynth.speak(utterance);
      }

      const scrollToTopBtn = document.getElementById("scroll-to-top-btn");
      window.onscroll = function () {
        if (
          document.body.scrollTop > 300 ||
          document.documentElement.scrollTop > 300
        ) {
          scrollToTopBtn.classList.remove("hidden");
        } else {
          scrollToTopBtn.classList.add("hidden");
        }
      };
      scrollToTopBtn.addEventListener("click", () => {
        window.scrollTo({ top: 0, behavior: "smooth" });
      });

      initApp();
    </script>
  </body>
</html>
